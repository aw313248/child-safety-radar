<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>PeekKids 設定</title>
<style>
  :root {
    --pk-blue: #007AFF;
    --pk-blue-dark: #0062CC;
    --pk-green: #34C759;
    --text: #111111;
    --text-secondary: #8E8E93;
    --bg: #F2F2F7;
    --surface: #FFFFFF;
    --border: rgba(60, 60, 67, 0.12);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 44px 20px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.035em;
    margin-bottom: 6px;
    color: var(--text);
  }
  h1 span { color: var(--pk-blue); }
  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 28px;
    letter-spacing: -0.01em;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 22px 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }
  input[type="text"] {
    width: 100%;
    padding: 13px 14px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0;
  }
  input[type="text"]:focus {
    border-color: var(--pk-blue);
    box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.12);
  }
  .help {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    letter-spacing: -0.01em;
    margin-top: 12px;
  }
  .help a { color: var(--pk-blue); font-weight: 600; text-decoration: none; }
  .help a:hover { text-decoration: underline; }
  .btn {
    background: var(--pk-blue);
    color: #fff;
    border: none;
    padding: 12px 22px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 16px;
  }
  .btn:hover { background: var(--pk-blue-dark); }
  .btn:active { transform: scale(0.98); }
  .saved {
    display: inline-block;
    margin-left: 10px;
    font-size: 13px;
    color: var(--pk-green);
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  h3 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    color: var(--text);
  }
  ol.steps {
    padding-left: 20px;
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.85;
    letter-spacing: -0.01em;
  }
  ol.steps code {
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 6px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 12px;
    color: var(--text);
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Peek<span>Kids</span> 設定</h1>
  <p class="subtitle">幫家有「皮」小孩的爸媽看穿 YouTube 頻道藏沒藏「艾莎門」</p>

  <div class="card">
    <label for="apiKey">API Key</label>
    <input type="text" id="apiKey" placeholder="貼上從官網拿到的 key">
    <button class="btn" id="save">儲存</button>
    <span class="saved" id="saved" style="display:none">✓ 已儲存</span>

    <p class="help">
      沒有 key？到 <a href="https://child-safety-radar.vercel.app" target="_blank">官網</a> 完成解鎖方案（NT$99／月）後就會拿到，
      <br>或貼朋友分享的 key 也可以用（額度共用）
    </p>
  </div>

  <div class="card">
    <h3>怎麼用</h3>
    <ol class="steps">
      <li>打開任何 YouTube 頻道頁（例：<code>youtube.com/@xxx</code>）</li>
      <li>畫面右下角會出現 🦉 <b>PeekKids 檢查</b> 浮動按鈕</li>
      <li>按一下 → 掃描 20 秒 → 直接在頁面上看到紅 / 橘 / 綠燈</li>
      <li>高風險頻道會自動展開詳情，低風險默默放行</li>
    </ol>
  </div>
</div>

<script src="options.js"></script>
</body>
</html>
