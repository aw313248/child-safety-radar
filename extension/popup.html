<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>PeekKids</title>
<style>
  :root {
    --pk-blue: #007AFF;
    --pk-blue-dark: #0062CC;
    --pk-green: #34C759;
    --pk-orange: #FF9500;
    --pk-red: #FF3B30;
    --text: #111111;
    --text-secondary: #8E8E93;
    --bg: #F2F2F7;
    --surface: #FFFFFF;
    --border: rgba(60, 60, 67, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang TC', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .header {
    padding: 18px 20px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.035em;
    line-height: 1;
  }
  .header h1 span { color: var(--pk-blue); }
  .header p {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    letter-spacing: -0.01em;
  }
  .body { padding: 14px 16px; }
  .channel-label {
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .channel-url {
    font-size: 12px;
    color: var(--text-secondary);
    word-break: break-all;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    letter-spacing: -0.01em;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .btn {
    width: 100%;
    padding: 13px;
    background: var(--pk-blue);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:hover:not(:disabled) { background: var(--pk-blue-dark); }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled {
    background: rgba(60, 60, 67, 0.12);
    color: rgba(60, 60, 67, 0.4);
    cursor: not-allowed;
  }
  .error {
    font-size: 12px;
    color: var(--pk-red);
    background: rgba(255, 59, 48, 0.08);
    border: 1px solid rgba(255, 59, 48, 0.20);
    padding: 10px 12px;
    border-radius: 10px;
    letter-spacing: -0.01em;
    line-height: 1.5;
  }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 10px;
  }
  .score {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text);
  }
  .score span { font-size: 13px; color: var(--text-secondary); font-weight: 500; margin-left: 4px; }
  .level {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 9999px;
    letter-spacing: -0.005em;
  }
  .level--high   { background: rgba(255,59,48,0.10);  color: var(--pk-red); }
  .level--medium { background: rgba(255,149,0,0.12);  color: var(--pk-orange); }
  .level--low    { background: rgba(52,199,89,0.10);  color: var(--pk-green); }
  .score--high   { color: var(--pk-red); }
  .score--medium { color: var(--pk-orange); }
  .score--low    { color: var(--pk-green); }
  .channel-name {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .summary {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }
  .recommendation {
    font-size: 12px;
    color: var(--text);
    line-height: 1.55;
    letter-spacing: -0.01em;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 10px;
  }
  .footer {
    padding: 12px 16px 16px;
    text-align: center;
  }
  .footer a {
    font-size: 12px;
    color: var(--text-secondary);
    text-decoration: none;
    letter-spacing: -0.01em;
    font-weight: 500;
  }
  .footer a:hover { color: var(--pk-blue); }
  .hint {
    font-size: 12px;
    color: var(--text-secondary);
    letter-spacing: -0.01em;
    line-height: 1.55;
    text-align: center;
    padding: 8px 0;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>Peek<span>Kids</span></h1>
    <p>YouTube 頻道兒童安全雷達</p>
  </div>

  <div class="body" id="body">
    <div id="content"></div>
  </div>

  <div class="footer">
    <a href="#" id="openOptions">⚙ 設定</a>
    &nbsp;·&nbsp;
    <a href="#" id="openSite" target="_blank">官網</a>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
